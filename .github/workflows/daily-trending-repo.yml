name: Daily Trending Repo

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-trending-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trending repo markdown
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OUTPUT_DIR: trending
          TRENDING_PERIOD: daily
        run: bash scripts/update-trending-repo.sh

      - name: Commit generated markdown
        run: |
          git add trending

          if git diff --cached --quiet; then
            echo "No generated markdown changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: add daily trending repo"
          git push
