name: Daily Trending Repo

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-trending-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trending repo markdown
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OUTPUT_DIR: trending
          TRENDING_PERIOD: daily
        run: bash scripts/update-trending-repo.sh

      - name: Commit generated markdown
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_AUTHOR_LOGIN: ${{ github.repository_owner }}
        run: |
          git add trending

          if git diff --cached --quiet; then
            echo "No generated markdown changes to commit."
            exit 0
          fi

          api_headers=(-H "Accept: application/vnd.github+json")
          if [ -n "${GH_TOKEN:-}" ]; then
            api_headers+=(-H "Authorization: Bearer ${GH_TOKEN}")
          fi

          author_id="$(curl -fsSL "${api_headers[@]}" \
            "https://api.github.com/users/${COMMIT_AUTHOR_LOGIN}" \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["id"])')"

          git config user.name "${COMMIT_AUTHOR_LOGIN}"
          git config user.email "${author_id}+${COMMIT_AUTHOR_LOGIN}@users.noreply.github.com"
          git commit -m "docs: add daily trending repo"
          git push
